        <div class="item"><div class="date">2023-08-19</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/Body-Pose-Estimation">Body-Pose-Estimation</a></div><div class="meta">Vision and pose estimation</div></div></div>
