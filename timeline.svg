        <div class="item"><div class="date">2023-12-04</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/Credit-Risk-Prediction">Credit-Risk-Prediction</a></div><div class="meta">ML credit scoring</div></div></div>
