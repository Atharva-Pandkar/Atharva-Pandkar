<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="2060" viewBox="0 0 1200 2060" role="img" aria-labelledby="title desc">
  <title id="title">Atharva Pandkar Repository Timeline</title>
  <desc id="desc">Chronological timeline of repositories created by Atharva Pandkar.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#38BDF8" flood-opacity="0.35"/>
    </filter>
    <style>
      .header { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .sub { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="2060" fill="url(#bg)" rx="20" />
  <rect x="24" y="24" width="1152" height="2012" fill="none" stroke="#1E293B" rx="16" />

  <text x="60" y="84" class="header">Timeline View (Beta)</text>
  <text x="60" y="114" class="sub">All repositories in chronological order | generated from GitHub metadata</text>

  <line x1="186" y1="160" x2="186" y2="1980" stroke="url(#line)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />

  <foreignObject x="40" y="140" width="1120" height="1860">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Segoe UI', Arial, sans-serif; color: #E2E8F0;">
      <style>
        .timeline { display: grid; gap: 14px; }
        .item { display: grid; grid-template-columns: 120px 26px 1fr; align-items: center; }
        .date { color: #7DD3FC; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
        .dot {
          width: 14px;
          height: 14px;
          border-radius: 999px;
          background: linear-gradient(135deg, #67E8F9, #0EA5E9);
          border: 2px solid #082F49;
          box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
          justify-self: center;
          transition: transform 160ms ease, box-shadow 160ms ease;
        }
        .card {
          background: linear-gradient(180deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
          border: 1px solid #334155;
          border-radius: 12px;
          padding: 10px 14px;
          transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
        }
        .repo { font-size: 15px; font-weight: 700; color: #E2E8F0; margin-bottom: 4px; }
        .meta { font-size: 12px; color: #94A3B8; }
        .item:hover .dot {
          transform: scale(1.18);
          box-shadow: 0 0 0 5px rgba(56, 189, 248, 0.25);
        }
        .item:hover .card {
          transform: translateX(4px);
          border-color: #38BDF8;
          box-shadow: 0 8px 24px rgba(2, 132, 199, 0.28);
        }
        .repo-link { color: #E2E8F0; text-decoration: none; }
        .repo-link:hover { color: #7DD3FC; }
      </style>

      <div class="timeline">
        <div class="item"><div class="date">2020-04-20</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/Android-Projects">Android-Projects</a></div><div class="meta">Started public repository history</div></div></div>
        <div class="item"><div class="date">2020-04-20</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/Projects-Done">Projects-Done</a></div><div class="meta">Project archive repository</div></div></div>
        <div class="item"><div class="date">2020-04-22</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/Competition-Problems-Solution">Competition-Problems-Solution</a></div><div class="meta">Problem-solving and algorithm practice</div></div></div>
        <div class="item"><div class="date">2020-06-25</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/sentiment_analysis">sentiment_analysis</a></div><div class="meta">NLP experiments</div></div></div>
        <div class="item"><div class="date">2020-10-20</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/2048">2048</a></div><div class="meta">RL and MCTS exploration</div></div></div>
        <div class="item"><div class="date">2021-12-06</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/WeatherApp">WeatherApp</a></div><div class="meta">Application and API integration</div></div></div>
        <div class="item"><div class="date">2023-04-12</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/Atharva-Pandkar">Atharva-Pandkar</a></div><div class="meta">Profile repository</div></div></div>
        <div class="item"><div class="date">2023-04-17</div><div class="dot"></div><div class="card"><div class="repo"><a class="repo-link" href="https://github.com/Atharva-Pandkar/Hand-Gesture-Recognition">Hand-Gesture-Recognition</a></div><div class="meta">Computer vision project</div></div></div>
